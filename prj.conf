# =============================================================================
# C++ support
# =============================================================================
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_CPP_RTTI=y
# CONFIG_CPP_EXCEPTIONS is intentionally NOT set

# =============================================================================
# Logging
# =============================================================================
CONFIG_LOG=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# =============================================================================
# Boot delay — gives the LSM6DS3TR-C time to complete power-on reset before
# the lsm6dsl driver's init runs and writes to CTRL3_C over I2C
# =============================================================================
CONFIG_BOOT_DELAY=100

# =============================================================================
# Sensor subsystem + LSM6DSL driver
# =============================================================================
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_ACCEL_ODR=4
CONFIG_LSM6DSL_GYRO_ODR=4
CONFIG_LSM6DSL_TRIGGER_NONE=y

# =============================================================================
# BLE — peripheral role, custom GATT service
# =============================================================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="NordicTelemetry"

# System work queue stack — needs headroom for I2C sensor reads triggered by
# the notify timer work item
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
